<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora BOLADA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <main class="calculator" aria-label="Calculadora simples">
      <h1>Calculadora</h1>

      <input
        id="display"
        class="display"
        type="text"
        value="0"
        aria-label="Resultado"
        readonly
      >

      <section class="buttons" aria-label="Teclas da calculadora">
        <button type="button" class="clear" data-action="clear">C</button>
        <button type="button" data-action="delete">DEL</button>
        <button type="button" class="operator" data-value="/">/</button>
        <button type="button" class="operator" data-value="*">x</button>

        <button type="button" data-value="7">7</button>
        <button type="button" data-value="8">8</button>
        <button type="button" data-value="9">9</button>
        <button type="button" class="operator" data-value="-">-</button>

        <button type="button" data-value="4">4</button>
        <button type="button" data-value="5">5</button>
        <button type="button" data-value="6">6</button>
        <button type="button" class="operator" data-value="+">+</button>

        <button type="button" data-value="1">1</button>
        <button type="button" data-value="2">2</button>
        <button type="button" data-value="3">3</button>
        <button type="button" data-value=".">.</button>

        <button type="button" class="zero" data-value="0">0</button>
        <button type="button" class="equals" data-action="calculate">=</button>
      </section>
    </main>

    <label class="theme-switch" for="themeToggle">
      <span>LIGHT</span>
      <input type="checkbox" id="themeToggle" aria-label="Alternar tema claro e escuro">
      <span class="switch-slider"></span>
      <span>DARK</span>
    </label>
  </div>

  <script src="script.js"></script>
</body>
</html>
